<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PayPal Developer - Create App</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="style04.css" />
  </head>
  <body>
    <div class="modal-overlay">
      <div class="modal-box">
        <div class="modal-header">
          <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" alt="PayPal" class="logo" />
          <button class="close-btn">&times;</button>
        </div>
        <h3>Create App</h3>
        <div class="form-group">
          <input type="text" placeholder="App Name" />
        </div>
        <p class="disclaimer">As a reminder, all apps created under your account should be related to your business and the type of business it conducts.</p>
        <p class="agreement">By clicking the button below, you agree to <a href="#">PayPal Developer Agreement</a> (US accounts only).</p>
        <button class="submit-btn">Create App</button>
      </div>
    </div>
  </body>
</html>
